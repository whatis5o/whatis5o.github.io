<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AfriStay</title>
    <link rel="icon" type="image/x-icon" href="/Pictures/favicon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oleo+Script+Swash+Caps:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Style/style.css">
    <link rel="stylesheet" href="/Style/auth.css">

</head>
<body>

        <nav id="navbar">
            <div class="logo-area">
                <a href="/"><img src="/Pictures/light-afri1.png" alt="AfriStay" class="full-logo"></a>
            </div>
    
            <div class="nav-wrapper" id="navWrapper">
                <i class="fa-solid fa-xmark menu-close" onclick="toggleMenu()"></i>
                <div class="nav-center">
                    <ul class="nav-links">
                        <li><a href="/">Home</a></li>
                        <li><a href="/Listings">Listings</a></li>
                        <li><a href="/Events/">Events</a></li>
                        <li><a href="/About">About</a></li>
                        <li><a href="/Contact">Contact</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <a href="/Favorites" class="icon-link"><i class="fa-regular fa-heart"></i></a>
                    <a href="/Auth" id="auth-btn" class="signin-btn">Sign In</a> 
                </div>
            </div>
            <i class="fa-solid fa-bars menu-open" onclick="toggleMenu()"></i>
        </nav>

    <div class="box auth-box">
        
        <div class="box-left">
            <div class="title-group">
                <h1 class="white">Join Us!</h1>
                <h1 class="white"></h1>
            </div>
            <p class="auth-desc">Access your bookings, favorites, and more.</p>
            <i class="fa-solid fa-key big-icon"></i>
        </div>

        <div class="box-right">
            
            <div class="auth-toggle" id="authToggleContainer">
                <button id="btn-signin" class="active" onclick="toggleAuth('signin')">Sign In</button>
                <button id="btn-signup" onclick="toggleAuth('signup')">Sign Up</button>
            </div>

            <form id="authForm">
                <h1 class="orange form-title" id="dynamicTitle">Sign In</h1>
                
                <div id="loginGroup">
                    <div class="input-group">
                        <input type="text" id="loginIdentifier" placeholder="Email or Phone (+250...)">
                    </div>
                </div>

                <div id="signupGroup" class="hidden">
                    <div class="input-group">
                        <input type="text" id="fullName" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <input type="email" id="signupEmail" placeholder="Email Address (Optional)">
                    </div>
                    <div class="input-group">
                        <input type="tel" id="signupPhone" placeholder="Phone Number (Optional, +250...)">
                        <p style="font-size: 11px; color: #888; margin-top: 5px; margin-left: 10px;">Fill at least one. If using Phone, we will text you a code.</p>
                    </div>
                </div>

                <div id="otpGroup" class="hidden">
                    <p style="margin-bottom: 15px; color: #555; font-size: 14px;">We sent a 6-digit code to your phone. Enter it below to verify your account.</p>
                    <div class="input-group">
                        <input type="text" id="otpCode" placeholder="Enter 6-digit SMS Code" autocomplete="one-time-code">
                    </div>
                </div>

                <div class="input-group" id="passwordGroup">
                    <input type="password" id="password" placeholder="Password">
                </div>

                <button type="submit" id="submitBtn">Login</button>
                
                <p id="authError" class="error-msg"></p>
                <p id="authSuccess" class="success-msg"></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
